<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Погода</title>
    <style>
        body {
            background: #0b0f19;
            color: #00d4ff;
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
            text-align: center;
        }
        nav {
            background: #1a1a2e;
            padding: 15px 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px 40px;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
        }
        nav a {
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
            color: #aaa;
        }
        nav a:hover { color: #00d4ff; }
        h1 {
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
            display: inline-block;
        }
        .search-box {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
        }
        input {
            background: #0b0f19;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 18px;
            width: 60%;
            margin-right: 10px;
        }
        button {
            background: #00d4ff;
            color: #0b0f19;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #00a3cc; }
        .weather-card {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }
        .weather-card .city {
            font-size: 32px;
            font-weight: bold;
        }
        .weather-card .temp {
            font-size: 60px;
            margin: 10px 0;
        }
        .weather-card .desc {
            font-size: 24px;
            color: #aaa;
        }
        .weather-card .details {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            font-size: 18px;
            color: #888;
        }
        .error {
            color: #ff6666;
            margin-top: 20px;
            display: none;
        }
        .loader {
            display: none;
            margin: 20px 0;
            color: #aaa;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 Главная</a>
        <a href="about.html">👤 Обо мне</a>
        <a href="hobby.html">🎯 Увлечения</a>
        <a href="game.html">🎮 Угадай число</a>
        <a href="habits.html">📋 Привычки</a>
        <a href="todo.html">✅ Список дел</a>
        <a href="weather.html" style="color: #00d4ff; font-weight: bold;">🌤️ Погода</a>
    </nav>

    <h1>🌤️ Погода в городе</h1>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Введите город (например, London)" />
        <button onclick="getWeather()">Узнать погоду</button>
        <p style="font-size: 14px; color: #555; margin-top: 10px;">Нажми Enter для поиска</p>
    </div>

    <div id="loader" class="loader">⏳ Загрузка данных...</div>
    <div id="errorMessage" class="error">❌ Город не найден. Проверьте название.</div>

    <div id="weatherCard" class="weather-card">
        <div class="city" id="cityName">---</div>
        <div class="temp" id="temperature">--°C</div>
        <div class="desc" id="description">---</div>
        <div class="details">
            <span>💧 Влажность: <span id="humidity">--</span>%</span>
            <span>💨 Ветер: <span id="wind">--</span> км/ч</span>
        </div>
    </div>

    <script>
        // ⚠️ ВСТАВЬ СВОЙ КЛЮЧ СЮДА (получи на openweathermap.org)
        const API_KEY = '2edb41e9dbf7c56e89f5ef8a5d6e68fc';

        document.getElementById('cityInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') getWeather();
        });

        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                alert('Введите название города!');
                return;
            }

            document.getElementById('loader').style.display = 'block';
            document.getElementById('weatherCard').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';

            try {
                // Запрос к OpenWeatherMap
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=ru`;
                const response = await fetch(url);

                if (!response.ok) {
                    if (response.status === 404) throw new Error('Город не найден');
                    throw new Error('Ошибка сервера');
                }

                const data = await response.json();

                const location = data.name;
                const temp = Math.round(data.main.temp);
                const desc = data.weather[0].description;
                const humidity = data.main.humidity;
                const wind = data.wind.speed;

                document.getElementById('cityName').textContent = location;
                document.getElementById('temperature').textContent = `${temp}°C`;
                document.getElementById('description').textContent = desc;
                document.getElementById('humidity').textContent = humidity;
                document.getElementById('wind').textContent = wind;
                document.getElementById('weatherCard').style.display = 'block';

            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('errorMessage').style.display = 'block';
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
